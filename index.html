<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Gaming - Waqas Ali Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --blood-red: #8b0000; 
            --deep-black: #050505;
            --horror-glow: rgba(255, 0, 0, 0.5);
        }
        
        body { 
            background: black;
            background-image: radial-gradient(circle, #220000 0%, #000000 100%);
            color: #ccc; 
            font-family: 'Courier New', Courier, monospace; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        .ghost-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.imgur.com/39S5uH9.png') no-repeat center;
            opacity: 0.05; pointer-events: none; z-index: -1;
            animation: ghostMove 10s infinite alternate linear;
        }
        @keyframes ghostMove {
            from { transform: scale(1) translate(0,0); }
            to { transform: scale(1.2) translate(20px, 20px); filter: hue-rotate(90deg); }
        }

        /* Home Button Style */
        .home-btn { position: fixed; top: 20px; left: 20px; background: rgba(139, 0, 0, 0.3); border: 1px solid red; color: white; padding: 5px 15px; font-size: 14px; cursor: pointer; z-index: 2000; text-decoration: none; transition: 0.3s; }
        .home-btn:hover { background: red; color: black; box-shadow: 0 0 10px red; }

        #secret-bar-container {
            position: fixed; top: -150px; left: 50%; transform: translateX(-50%);
            width: 300px; background: #111; border: 2px solid red;
            padding: 15px; z-index: 10000; transition: 0.5s;
            box-shadow: 0 0 20px red;
        }
        #secret-bar-container.active { top: 20px; }
        .secret-input {
            background: black; border: 1px solid #400; color: red;
            width: 100%; text-align: center; outline: none;
        }

        .search-container { max-width: 400px; margin: 0 auto 30px; }
        .search-bar { background: #111 !important; border: 1px solid var(--blood-red) !important; color: red !important; border-radius: 0; }

        .music-btn { position: fixed; top: 20px; right: 20px; background: rgba(139, 0, 0, 0.3); border: 1px solid red; color: white; padding: 5px 10px; font-size: 12px; cursor: pointer; z-index: 2000; }

        #code-loader { width: 0%; height: 3px; background: red; position: fixed; top: 0; left: 0; z-index: 9999; box-shadow: 0 0 10px red; display: none; }

        h1 { color: var(--blood-red); text-shadow: 0 0 10px red; animation: flicker 2s infinite; }
        @keyframes flicker { 0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; } 20%, 22%, 24%, 55% { opacity: 0.2; } }

        .game-card { background: #0a0a0a; border: 1px solid #400; border-radius: 0px; transition: 0.5s; overflow: hidden; position: relative; }
        .game-card:hover { border-color: red; box-shadow: 0 0 30px var(--blood-red); transform: scale(1.02); }

        .admin-box { background: rgba(10, 0, 0, 0.9); border: 2px solid var(--blood-red); padding: 30px; display: none; box-shadow: 0 0 50px rgba(139, 0, 0, 0.5); margin-bottom: 40px; }

        .form-control { background: #111; border: 1px solid #500; color: #ff0000; margin-bottom: 15px; }
        .form-control::placeholder { color: #555; }

        .settings-toggle { position: fixed; bottom: 30px; right: 30px; background: #300; color: red; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; border: 2px solid red; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); pointer-events: none; opacity: 0.3; }
        
        .game-info-label { font-size: 0.8rem; color: #888; margin-bottom: 2px; }
        .game-info-val { font-size: 1rem; color: #fff; margin-bottom: 10px; border-bottom: 1px dashed #400; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="ghost-bg"></div>
<div id="code-loader"></div>
<div class="overlay"></div>

<a href="javascript:void(0)" onclick="location.reload()" class="home-btn"><i class="fas fa-home"></i> HOME</a>

<div id="secret-bar-container">
    <label class="text-danger small">ENTER SECRET CODE:</label>
    <input type="password" id="secretInputBar" class="secret-input" placeholder="********">
    <button onclick="checkSecretCode()" class="btn btn-sm btn-danger w-100 mt-2" style="font-size:10px;">UNLOCK ADMIN</button>
</div>

<audio id="bgMusic" loop src="https://www.soundjay.com/ambient/sounds/creepy-background-01.mp3"></audio>
<audio id="horrorSound" src="https://www.soundjay.com/mechanical/sounds/clunk-1.mp3"></audio>
<audio id="screamSound" src="https://www.myinstants.com/media/sounds/female-scream-meme.mp3"></audio>

<button class="music-btn" onclick="toggleMusic()"><i class="fas fa-ghost"></i> Sound On/Off</button>

<div class="settings-toggle" onclick="playHorror(); showSecretBar()">
    <i class="fas fa-skull"></i>
</div>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-3 fw-bold">W.A <span style="color:white;">HORROR</span> STORE</h1>
        <p style="color: #666; letter-spacing: 5px;">DON'T OPEN AT NIGHT</p>
    </div>

    <div class="search-container">
        <input type="text" id="gameSearch" class="form-control search-bar" placeholder="Search Nightmare..." onkeyup="searchGame()">
    </div>

    <div class="admin-box container" id="adminPanel">
        <h3 class="text-danger mb-4" id="adminTitle"><i class="fas fa-ghost me-2"></i>ADD NEW ITEM</h3>
        <input type="hidden" id="editIndex" value="-1">
        <div class="row">
            <div class="col-md-6"><label>Game Name:</label><input type="text" id="gName" class="form-control"></div>
            <div class="col-md-3"><label>Price:</label><input type="text" id="gPrice" class="form-control"></div>
            <div class="col-md-3"><label>Size:</label><input type="text" id="gSize" class="form-control"></div>
            <div class="col-md-6"><label>WhatsApp Number:</label><input type="text" id="gContact" class="form-control"></div>
            <div class="col-md-6"><label>Trailer Link:</label><input type="text" id="gTrailer" class="form-control" placeholder="Paste YouTube link here"></div>
            <div class="col-md-6"><label>Poster Image:</label><input type="file" id="gFile" class="form-control" accept="image/*"></div>
            <div class="col-12 mt-3">
                <button onclick="playScream(); saveGame()" class="btn btn-danger w-100 fw-bold py-3" id="saveBtn">SUMMON GAME (SAVE)</button>
                <button onclick="cancelEdit()" class="btn btn-secondary w-100 mt-2" id="cancelBtn" style="display:none;">CANCEL EDIT</button>
            </div>
        </div>
    </div>

    <div class="row g-4" id="gameGrid"></div>
</div>

<script>
    const ADMIN_CODE = "waqasali1055";
    let gamesDatabase = JSON.parse(localStorage.getItem('horror_games_db')) || [];
    let isPlaying = false;
    let isAdminVisible = false;

    function toggleMusic() {
        let music = document.getElementById('bgMusic');
        if (!isPlaying) { music.play(); isPlaying = true; } 
        else { music.pause(); isPlaying = false; }
    }

    function playHorror() { document.getElementById('horrorSound').play(); }
    function playScream() { document.getElementById('screamSound').play(); }

    function showSecretBar() {
        document.getElementById('secret-bar-container').classList.toggle('active');
    }

    function checkSecretCode() {
        let val = document.getElementById('secretInputBar').value;
        if (val === ADMIN_CODE) {
            document.getElementById('secret-bar-container').classList.remove('active');
            isAdminVisible = true;
            startLoading();
        } else {
            alert("WRONG CODE. DEATH AWAITS.");
        }
    }

    function startLoading() {
        let loader = document.getElementById('code-loader');
        loader.style.display = 'block';
        let width = 0;
        let id = setInterval(() => {
            if (width >= 100) {
                clearInterval(id);
                loader.style.display = 'none';
                loader.style.width = '0%';
                document.getElementById('adminPanel').style.display = 'block';
                displayGames();
            } else { width += 5; loader.style.width = width + '%'; }
        }, 30);
    }

    function saveGame() {
        const name = document.getElementById('gName').value;
        const price = document.getElementById('gPrice').value;
        const size = document.getElementById('gSize').value;
        const contact = document.getElementById('gContact').value;
        const trailer = document.getElementById('gTrailer').value;
        const fileInput = document.getElementById('gFile');
        const editIndex = parseInt(document.getElementById('editIndex').value);

        if(!name || !price) { alert("Game Name and Price are mandatory!"); return; }

        const processSave = (imgData) => {
            const gameData = {
                id: editIndex === -1 ? Date.now() : gamesDatabase[editIndex].id,
                name, price, size, contact, trailer,
                img: imgData || (editIndex !== -1 ? gamesDatabase[editIndex].img : 'https://via.placeholder.com/250x250?text=No+Image')
            };

            if (editIndex === -1) { gamesDatabase.unshift(gameData); }
            else { gamesDatabase[editIndex] = gameData; }

            localStorage.setItem('horror_games_db', JSON.stringify(gamesDatabase));
            displayGames();
            cancelEdit();
            alert("Game Published Successfully!");
        };

        if (fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => processSave(e.target.result);
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            processSave();
        }
    }

    function editGame(index) {
        const game = gamesDatabase[index];
        document.getElementById('adminTitle').innerHTML = "<i class='fas fa-edit me-2'></i>EDIT SOUL";
        document.getElementById('gName').value = game.name;
        document.getElementById('gPrice').value = game.price;
        document.getElementById('gSize').value = game.size;
        document.getElementById('gContact').value = game.contact;
        document.getElementById('gTrailer').value = game.trailer;
        document.getElementById('editIndex').value = index;
        document.getElementById('saveBtn').innerText = "UPDATE CHANGES";
        document.getElementById('cancelBtn').style.display = "block";
        document.getElementById('adminPanel').style.display = 'block';
        window.scrollTo(0,0);
    }

    function cancelEdit() {
        document.getElementById('adminTitle').innerHTML = "<i class='fas fa-ghost me-2'></i>ADD NEW ITEM";
        document.getElementById('editIndex').value = "-1";
        document.getElementById('gName').value = "";
        document.getElementById('gPrice').value = "";
        document.getElementById('gSize').value = "";
        document.getElementById('gContact').value = "";
        document.getElementById('gTrailer').value = "";
        document.getElementById('gFile').value = "";
        document.getElementById('saveBtn').innerText = "SUMMON GAME (SAVE)";
        document.getElementById('cancelBtn').style.display = "none";
        document.getElementById('adminPanel').style.display = 'none';
    }

    function searchGame() {
        let input = document.getElementById('gameSearch').value.toLowerCase();
        displayGames(input);
    }

    function displayGames(filter = "") {
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = "";
        
        gamesDatabase.forEach((game, index) => {
            if (game.name.toLowerCase().includes(filter)) {
                // Check if trailer link exists and is valid
                const trailerBtn = game.trailer ? `<a href="${game.trailer}" target="_blank" class="btn btn-outline-danger w-50">TRAILER</a>` : `<button class="btn btn-outline-secondary w-50" disabled>NO TRAILER</button>`;

                grid.innerHTML += `
                    <div class="col-lg-4 col-md-6">
                        <div class="game-card p-3">
                            <img src="${game.img}" class="w-100 mb-3" style="height:250px; object-fit:cover; filter: grayscale(50%);">
                            <h4 class="text-danger fw-bold text-center">${game.name}</h4>
                            
                            <div class="mt-3">
                                <div class="game-info-label">BLOOD PRICE</div>
                                <div class="game-info-val">${game.price}</div>
                                
                                <div class="game-info-label">SOUL SIZE</div>
                                <div class="game-info-val">${game.size}</div>
                                
                                <div class="game-info-label">OWNER WHATSAPP</div>
                                <div class="game-info-val">${game.contact}</div>
                            </div>

                            <div class="d-flex gap-2">
                                ${trailerBtn}
                                <a href="https://wa.me/${game.contact}?text=I want to buy ${game.name}" target="_blank" class="btn btn-danger w-50">BUY NOW</a>
                            </div>

                            ${isAdminVisible ? `
                                <div class="mt-3 border-top border-secondary pt-2 d-flex justify-content-between">
                                    <button onclick="editGame(${index})" class="btn btn-sm btn-warning text-dark fw-bold">EDIT</button>
                                    <button onclick="deleteGame(${game.id})" class="btn btn-sm btn-dark text-danger">DELETE</button>
                                </div>
                            ` : ''}
                        </div>
                    </div>`;
            }
        });
    }

    function deleteGame(id) {
        if(confirm("Destroy this record forever?")) {
            gamesDatabase = gamesDatabase.filter(g => g.id !== id);
            localStorage.setItem('horror_games_db', JSON.stringify(gamesDatabase));
            displayGames();
        }
    }

    window.onload = () => {
        displayGames();
    };
</script>
</body>
</html>
